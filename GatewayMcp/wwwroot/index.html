<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gateway MCP — Dashboard</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      min-height: 100vh;
      padding: 2rem;
    }

    /* Top bar */
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1.75rem;
    }

    .topbar-left h1 {
      font-size: 1.5rem;
      font-weight: 600;
      color: #f8fafc;
    }

    .topbar-left .subtitle {
      font-size: 0.875rem;
      color: #64748b;
      margin-top: 0.25rem;
    }

    .topbar-right {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    #user-label {
      font-size: 0.875rem;
      color: #94a3b8;
    }

    .btn-logout {
      background: #334155;
      color: #e2e8f0;
      border: none;
      border-radius: 6px;
      font-size: 0.8rem;
      font-weight: 500;
      padding: 0.4rem 0.85rem;
      cursor: pointer;
      transition: opacity 0.15s;
    }

    .btn-logout:hover { opacity: 0.8; }

    /* Add server form */
    .add-form {
      background: #1e2130;
      border: 1px solid #2d3148;
      border-radius: 8px;
      padding: 1.25rem 1.5rem;
      margin-bottom: 2rem;
      display: flex;
      gap: 0.75rem;
      align-items: flex-end;
      flex-wrap: wrap;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 0.375rem;
    }

    .field label {
      font-size: 0.75rem;
      font-weight: 500;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .field input {
      background: #0f1117;
      border: 1px solid #2d3148;
      border-radius: 6px;
      color: #e2e8f0;
      font-size: 0.875rem;
      padding: 0.5rem 0.75rem;
      width: 220px;
      outline: none;
      transition: border-color 0.15s;
    }

    .field input:focus { border-color: #6366f1; }
    .field input::placeholder { color: #475569; }

    button {
      cursor: pointer;
      border: none;
      border-radius: 6px;
      font-size: 0.875rem;
      font-weight: 500;
      padding: 0.5rem 1rem;
      transition: opacity 0.15s, background 0.15s;
    }

    button:hover { opacity: 0.85; }
    button:active { opacity: 0.7; }

    .btn-primary { background: #6366f1; color: #fff; }
    .btn-connect { background: #0ea5e9; color: #fff; font-size: 0.75rem; padding: 0.35rem 0.75rem; }
    .btn-delete  { background: #475569; color: #e2e8f0; font-size: 0.75rem; padding: 0.35rem 0.75rem; }

    /* Server list */
    .servers-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 0.75rem;
    }

    .servers-title { font-size: 1rem; font-weight: 600; color: #f8fafc; }

    .poll-indicator {
      font-size: 0.75rem;
      color: #475569;
    }

    .server-list { display: flex; flex-direction: column; gap: 0.75rem; }

    .server-card {
      background: #1e2130;
      border: 1px solid #2d3148;
      border-radius: 8px;
      padding: 1rem 1.25rem;
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .server-info { flex: 1; min-width: 0; }

    .server-name {
      font-weight: 600;
      font-size: 0.9375rem;
      color: #f1f5f9;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .server-url {
      font-size: 0.75rem;
      color: #64748b;
      margin-top: 0.125rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* Status badges */
    .badge {
      display: inline-block;
      border-radius: 999px;
      font-size: 0.7rem;
      font-weight: 600;
      padding: 0.2rem 0.6rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      white-space: nowrap;
    }

    .badge-disconnected { background: #1e293b; color: #64748b; border: 1px solid #334155; }
    .badge-connecting   { background: #78350f33; color: #fbbf24; border: 1px solid #92400e; }
    .badge-connected    { background: #05966933; color: #34d399; border: 1px solid #065f46; }
    .badge-auth_required{ background: #7f1d1d33; color: #f87171; border: 1px solid #991b1b; }

    .server-actions { display: flex; gap: 0.5rem; flex-shrink: 0; }

    .empty-state {
      color: #475569;
      font-size: 0.875rem;
      text-align: center;
      padding: 2.5rem;
      border: 1px dashed #2d3148;
      border-radius: 8px;
    }

    .toast {
      position: fixed;
      bottom: 1.5rem;
      right: 1.5rem;
      background: #1e2130;
      border: 1px solid #2d3148;
      border-radius: 8px;
      padding: 0.75rem 1.25rem;
      font-size: 0.875rem;
      color: #e2e8f0;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
      max-width: 320px;
      z-index: 999;
    }

    .toast.show { opacity: 1; }
    .toast.error { border-color: #991b1b; color: #f87171; }
  </style>
</head>
<body>

  <div class="topbar">
    <div class="topbar-left">
      <h1>Gateway MCP Dashboard</h1>
      <p class="subtitle">Manage downstream MCP servers and their OAuth connections.</p>
    </div>
    <div class="topbar-right">
      <span id="user-label"></span>
      <button class="btn-logout" onclick="logout()">Logout</button>
    </div>
  </div>

  <div class="add-form">
    <div class="field">
      <label for="inp-name">Server name</label>
      <input id="inp-name" type="text" placeholder="e.g. DiscordMcp" autocomplete="off" />
    </div>
    <div class="field">
      <label for="inp-url">Server URL</label>
      <input id="inp-url" type="text" placeholder="http://localhost:7072/" autocomplete="off" />
    </div>
    <button class="btn-primary" onclick="addServer()">Add Server</button>
  </div>

  <div class="servers-header">
    <span class="servers-title">Registered servers</span>
    <span class="poll-indicator" id="poll-label">auto-refreshing…</span>
  </div>

  <div class="server-list" id="server-list">
    <div class="empty-state">No servers registered yet.</div>
  </div>

  <div class="toast" id="toast"></div>

  <script type="module">
    import { jwtVerify, createRemoteJWKSet } from 'https://esm.sh/jose@6';

    // ── Auth config ──────────────────────────────────────────────────────────
    const KEYCLOAK_URL = 'http://localhost:8080/realms/mcp';
    const CLIENT_ID    = 'gateway-dashboard';
    const REDIRECT_URI = 'http://localhost:7071/dashboard';
    const SCOPE        = 'openid mcp:tools';

    // ── OIDC discovery ────────────────────────────────────────────────────────
    let oidcConfig = null;
    async function loadOidcConfig() {
      if (oidcConfig) return oidcConfig;
      const res = await fetch(`${KEYCLOAK_URL}/.well-known/openid-configuration`);
      if (!res.ok) throw new Error('Failed to fetch OIDC discovery document');
      oidcConfig = await res.json();
      return oidcConfig;
    }

    // ── JWKS (lazy, cached by jose internally) ────────────────────────────────
    let jwks = null;
    async function getJwks() {
      if (jwks) return jwks;
      const cfg = await loadOidcConfig();
      jwks = createRemoteJWKSet(new URL(cfg.jwks_uri));
      return jwks;
    }

    // ── id_token validation ───────────────────────────────────────────────────
    // expectedNonce is only required on initial authorization_code exchange.
    async function validateIdToken(idToken, expectedNonce = null) {
      const [keys, cfg] = await Promise.all([getJwks(), loadOidcConfig()]);
      const { payload } = await jwtVerify(idToken, keys, {
        issuer:   cfg.issuer,
        audience: CLIENT_ID,
      });
      if (expectedNonce !== null && payload.nonce !== expectedNonce)
        throw new Error('id_token nonce mismatch');
      return payload;
    }

    // ── PKCE helpers ─────────────────────────────────────────────────────────
    function base64urlEncode(buf) {
      return btoa(String.fromCharCode(...new Uint8Array(buf)))
        .replace(/\+/g, '-').replace(/\//g, '_').replace(/=/g, '');
    }

    function generateRandom() {
      return base64urlEncode(crypto.getRandomValues(new Uint8Array(32)));
    }

    async function generatePkce() {
      const verifier = base64urlEncode(crypto.getRandomValues(new Uint8Array(64)));
      const hash = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(verifier));
      const challenge = base64urlEncode(hash);
      return { verifier, challenge };
    }

    // ── Token helpers ─────────────────────────────────────────────────────────
    function getTokens() {
      return {
        accessToken:  sessionStorage.getItem('access_token'),
        idToken:      sessionStorage.getItem('id_token'),
        refreshToken: sessionStorage.getItem('refresh_token'),
        expiresAt:    Number(sessionStorage.getItem('expires_at') || 0),
      };
    }

    function storeTokens(data) {
      sessionStorage.setItem('access_token', data.access_token);
      sessionStorage.setItem('expires_at',   String(Date.now() + data.expires_in * 1000));
      if (data.refresh_token) sessionStorage.setItem('refresh_token', data.refresh_token);
      if (data.id_token)      sessionStorage.setItem('id_token',      data.id_token);
    }

    function clearTokens() {
      ['access_token', 'id_token', 'refresh_token', 'expires_at',
       'pkce_verifier', 'pkce_state', 'pkce_nonce', 'user_name'].forEach(k =>
        sessionStorage.removeItem(k));
    }

    // ── Auth flow ─────────────────────────────────────────────────────────────
    async function redirectToLogin() {
      const { verifier, challenge } = await generatePkce();
      const state = generateRandom();
      const nonce = generateRandom();
      sessionStorage.setItem('pkce_verifier', verifier);
      sessionStorage.setItem('pkce_state',    state);
      sessionStorage.setItem('pkce_nonce',    nonce);
      const cfg = await loadOidcConfig();
      const params = new URLSearchParams({
        response_type:         'code',
        client_id:             CLIENT_ID,
        redirect_uri:          REDIRECT_URI,
        scope:                 SCOPE,
        code_challenge:        challenge,
        code_challenge_method: 'S256',
        state,
        nonce,
      });
      window.location.href = `${cfg.authorization_endpoint}?${params}`;
    }

    async function exchangeCode(code, returnedState) {
      const verifier     = sessionStorage.getItem('pkce_verifier');
      const storedState  = sessionStorage.getItem('pkce_state');
      const nonce        = sessionStorage.getItem('pkce_nonce');

      if (!verifier || !storedState) { await redirectToLogin(); return false; }

      // CSRF guard
      if (returnedState !== storedState) {
        console.error('OAuth state mismatch — possible CSRF attempt');
        clearTokens();
        await redirectToLogin();
        return false;
      }

      const cfg = await loadOidcConfig();
      const res = await fetch(cfg.token_endpoint, {
        method: 'POST',
        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
        body: new URLSearchParams({
          grant_type:    'authorization_code',
          client_id:     CLIENT_ID,
          redirect_uri:  REDIRECT_URI,
          code,
          code_verifier: verifier,
        }),
      });
      if (!res.ok) { clearTokens(); await redirectToLogin(); return false; }

      const data = await res.json();

      // Validate id_token (signature + iss + aud + exp + nonce)
      if (data.id_token) {
        try {
          const payload = await validateIdToken(data.id_token, nonce);
          sessionStorage.setItem('user_name',
            payload.preferred_username || payload.email || 'User');
        } catch (err) {
          console.error('id_token validation failed:', err);
          clearTokens();
          await redirectToLogin();
          return false;
        }
      }

      storeTokens(data);
      ['pkce_verifier', 'pkce_state', 'pkce_nonce'].forEach(k =>
        sessionStorage.removeItem(k));
      return true;
    }

    async function tryRefresh() {
      const { refreshToken } = getTokens();
      if (!refreshToken) { await redirectToLogin(); return false; }
      const cfg = await loadOidcConfig();
      const res = await fetch(cfg.token_endpoint, {
        method: 'POST',
        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
        body: new URLSearchParams({
          grant_type:    'refresh_token',
          client_id:     CLIENT_ID,
          refresh_token: refreshToken,
        }),
      });
      if (!res.ok) { clearTokens(); await redirectToLogin(); return false; }

      const data = await res.json();

      // Validate refreshed id_token (no nonce check — nonce is only for initial auth)
      if (data.id_token) {
        try {
          const payload = await validateIdToken(data.id_token);
          sessionStorage.setItem('user_name',
            payload.preferred_username || payload.email || 'User');
        } catch (err) {
          console.error('Refreshed id_token validation failed:', err);
          clearTokens();
          await redirectToLogin();
          return false;
        }
      }

      storeTokens(data);
      return true;
    }

    function renderUser() {
      const name = sessionStorage.getItem('user_name') || 'User';
      document.getElementById('user-label').textContent = `Hello, ${name}`;
    }

    async function initAuth() {
      const params = new URLSearchParams(window.location.search);
      const code   = params.get('code');
      const state  = params.get('state');

      if (code) {
        // Step 1: exchange code for tokens (verifies state + validates id_token)
        const ok = await exchangeCode(code, state);
        history.replaceState(null, '', window.location.pathname);
        if (!ok) return;
        renderUser();
        startDashboard();
        return;
      }

      const { accessToken, expiresAt, refreshToken } = getTokens();

      if (accessToken && Date.now() < expiresAt - 5000) {
        // Step 2: valid token already in sessionStorage
        renderUser();
        startDashboard();
        return;
      }

      if (refreshToken) {
        // Step 3: try refresh
        const ok = await tryRefresh();
        if (ok) { renderUser(); startDashboard(); return; }
        return; // redirectToLogin called inside tryRefresh on failure
      }

      // Step 4: no tokens — send to Keycloak
      await redirectToLogin();
    }

    async function logout() {
      const { idToken } = getTokens();
      const cfg = await loadOidcConfig();
      const params = new URLSearchParams({
        client_id:                CLIENT_ID,
        post_logout_redirect_uri: REDIRECT_URI,
      });
      if (idToken) params.set('id_token_hint', idToken);
      clearTokens();
      window.location.href = `${cfg.end_session_endpoint}?${params}`;
    }

    // ── Authenticated fetch wrapper ───────────────────────────────────────────
    async function apiFetch(url, opts = {}) {
      let { accessToken, expiresAt, refreshToken } = getTokens();

      // Proactively refresh if within 30 s of expiry
      if (refreshToken && Date.now() > expiresAt - 30000) {
        const ok = await tryRefresh();
        if (!ok) throw new Error('Unauthenticated');
        ({ accessToken } = getTokens());
      }

      if (!accessToken) { await redirectToLogin(); throw new Error('Unauthenticated'); }

      const headers = { ...(opts.headers || {}), Authorization: `Bearer ${accessToken}` };
      const res = await fetch(url, { ...opts, headers });

      if (res.status === 401) {
        clearTokens();
        await redirectToLogin();
        throw new Error('Unauthenticated');
      }

      if (res.status === 403) {
        showToast('Access denied.', true);
        throw new Error('Unauthorized');
      }

      return res;
    }

    // ── Dashboard logic ───────────────────────────────────────────────────────
    let servers    = [];
    let pollHandle = null;

    function startDashboard() {
      poll();
      pollHandle = setInterval(poll, 2000);
    }

    function statusBadge(status) {
      return `<span class="badge badge-${status}">${status.replace('_', ' ')}</span>`;
    }

    function render(data) {
      servers = data;
      const list = document.getElementById('server-list');
      if (!data.length) {
        list.innerHTML = '<div class="empty-state">No servers registered yet.</div>';
        return;
      }
      list.innerHTML = data.map(s => `
        <div class="server-card" id="card-${s.id}">
          <div class="server-info">
            <div class="server-name">${esc(s.name)}</div>
            <div class="server-url">${esc(s.url)}</div>
          </div>
          ${statusBadge(s.status)}
          <div class="server-actions">
            <button class="btn-connect" onclick="connectServer('${s.id}')">Connect</button>
            <button class="btn-delete"  onclick="deleteServer('${s.id}')">Delete</button>
          </div>
        </div>
      `).join('');
    }

    async function poll() {
      try {
        const res = await apiFetch('/api/servers');
        if (!res.ok) return;
        render(await res.json());
        document.getElementById('poll-label').textContent = `updated ${new Date().toLocaleTimeString()}`;
      } catch (_) {}
    }

    async function addServer() {
      const name = document.getElementById('inp-name').value.trim();
      const url  = document.getElementById('inp-url').value.trim();
      if (!name || !url) { showToast('Name and URL are required.', true); return; }

      try {
        const res = await apiFetch('/api/servers', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, url }),
        });
        if (!res.ok) { showToast('Failed to add server.', true); return; }
        document.getElementById('inp-name').value = '';
        document.getElementById('inp-url').value = '';
        await poll();
        showToast(`Added "${name}".`);
      } catch (e) {
        if (e.message !== 'Unauthenticated' && e.message !== 'Unauthorized')
          showToast('Network error.', true);
      }
    }

    async function connectServer(id) {
      try {
        const res = await apiFetch(`/api/servers/${id}/connect`);
        if (!res.ok) { showToast('Failed to initiate connect.', true); return; }
        const { authUrl } = await res.json();
        window.open(authUrl, '_blank', 'width=600,height=700');
      } catch (e) {
        if (e.message !== 'Unauthenticated' && e.message !== 'Unauthorized')
          showToast('Network error.', true);
      }
    }

    async function deleteServer(id) {
      const s = servers.find(x => x.id === id);
      if (!confirm(`Delete "${s?.name ?? id}"?`)) return;
      try {
        const res = await apiFetch(`/api/servers/${id}`, { method: 'DELETE' });
        if (!res.ok) { showToast('Failed to delete.', true); return; }
        await poll();
        showToast('Deleted.');
      } catch (e) {
        if (e.message !== 'Unauthenticated' && e.message !== 'Unauthorized')
          showToast('Network error.', true);
      }
    }

    let toastTimer;
    function showToast(msg, isError = false) {
      const el = document.getElementById('toast');
      el.textContent = msg;
      el.classList.toggle('error', isError);
      el.classList.add('show');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => el.classList.remove('show'), 3000);
    }

    function esc(str) {
      return String(str)
        .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
        .replace(/"/g,'&quot;');
    }

    // ── Expose to inline HTML event handlers (required for ES modules) ────────
    window.logout        = logout;
    window.addServer     = addServer;
    window.connectServer = connectServer;
    window.deleteServer  = deleteServer;

    // ── Boot ──────────────────────────────────────────────────────────────────
    initAuth();
  </script>
</body>
</html>
